name: test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install -q --upgrade pip wheel
          .venv/bin/pip install -q -r requirements.lock

      - name: Run tests
        run: bash scripts/test.sh

      - name: MCP module smoke
        run: .venv/bin/python -c "import mcp_server.server as s; print('mcp tools ok')"

  test-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\pip install -q --upgrade pip wheel
          .\.venv\Scripts\pip install -q -r requirements.lock

      - name: Run check.ps1
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/check.ps1
